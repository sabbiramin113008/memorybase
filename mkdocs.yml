site_name: MemoryBase
site_description: The project operating system for AI agents
site_url: https://sabbiramin113008.github.io/memorybase
repo_url: https://github.com/sabbiramin113008/memorybase
repo_name: memorybase
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: zinc
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: zinc
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

docs_dir: docs/docs

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - MCP Tools: mcp-tools.md
  - API Reference: api-reference.md
  - Configuration: configuration.md
  - Self-Hosting: self-hosting.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

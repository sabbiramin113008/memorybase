services:
  memorybase:
    build: .
    image: memorybase:latest
    ports:
      - "8000:8000"
    volumes:
      - ./memorybase_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
